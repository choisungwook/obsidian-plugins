name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            manifest.json
      - name: Wait until attestations are verifiable via the public API
        env:
          GH_TOKEN: ${{ github.token }}
        # The marketplace scans release assets as soon as the release is
        # published. On 0.1.3 signing and publication were 3 seconds apart and
        # the scan reported "failed cryptographic verification" even though
        # gh attestation verify passed afterwards — gate the release on the
        # attestation actually being fetchable and valid through the same
        # public API the scanner uses.
        run: |
          for attempt in $(seq 1 10); do
            if gh attestation verify main.js --repo "$GITHUB_REPOSITORY" &&
               gh attestation verify manifest.json --repo "$GITHUB_REPOSITORY"; then
              exit 0
            fi
            echo "Attestations not verifiable yet (attempt $attempt/10); retrying in 15s"
            sleep 15
          done
          echo "::error::Attestations are still not verifiable via the GitHub API; aborting release."
          exit 1
      - name: Resolve release tag from manifest
        id: version
        # Obsidian marketplace requires the release tag to exactly match
        # manifest.json's version, with no prefix
        run: echo "tag=$(node -p 'require("./manifest.json").version')" >> "$GITHUB_OUTPUT"
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        # Obsidian downloads only main.js and manifest.json from the release;
        # extra assets like versions.json trigger review warnings.
        # Existing releases are never overwritten: Obsidian verifies that the
        # assets' attestation was built from the tag's commit, so replacing
        # assets under an old tag fails attestation. Every change must ship
        # as a new version (bump manifest.json/versions.json in the PR).
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            echo "::error::Release $TAG already exists. Overwriting a released version is not allowed — bump manifest.json's version (and versions.json) in the PR."
            exit 1
          fi
          gh release create "$TAG" main.js manifest.json \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --generate-notes
