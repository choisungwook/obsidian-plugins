name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - name: Validate release tag
        id: version
        run: |
          manifest_version=$(node -p 'require("./manifest.json").version')
          if [[ "$GITHUB_REF_NAME" != "$manifest_version" ]]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match manifest version $manifest_version."
            exit 1
          fi
          echo "tag=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
      - name: Forbid overwriting released versions
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            echo "::error::Release $TAG already exists. Overwriting a released version is not allowed — bump manifest.json's version (and versions.json) in the PR."
            exit 1
          fi
      - run: npm ci
      - run: npm run build
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            main.js
            manifest.json
      - name: Wait until attestations are verifiable via the public API
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          verify_attestation() {
            local subject="$1"
            local result
            result=$(gh attestation verify "$subject" --repo "$GITHUB_REPOSITORY" --format json) || return 1
            jq -e --arg ref "$GITHUB_REF" --arg sha "$GITHUB_SHA" '
              any(.[];
                .verificationResult.signature.certificate as $certificate |
                $certificate.sourceRepositoryRef == $ref and
                $certificate.githubWorkflowRef == $ref and
                $certificate.sourceRepositoryDigest == $sha
              )
            ' <<< "$result" > /dev/null
          }

          for attempt in $(seq 1 10); do
            if verify_attestation main.js && verify_attestation manifest.json; then
              exit 0
            fi
            echo "Attestations not verifiable yet (attempt $attempt/10); retrying in 15s"
            sleep 15
          done
          echo "::error::Attestations are still not verifiable via the GitHub API; aborting release."
          exit 1
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            main.js
            manifest.json
