name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Resolve release tag from manifest
        id: version
        # Obsidian marketplace requires the release tag to exactly match
        # manifest.json's version, with no prefix
        run: echo "tag=$(node -p "require('./manifest.json').version")" >> "$GITHUB_OUTPUT"
      - name: Create release if it does not exist
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            echo "Release $TAG already exists, skipping"
            exit 0
          fi
          gh release create "$TAG" main.js manifest.json versions.json \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --generate-notes
