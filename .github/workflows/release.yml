name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            manifest.json
      - name: Resolve release tag from manifest
        id: version
        # Obsidian marketplace requires the release tag to exactly match
        # manifest.json's version, with no prefix
        run: echo "tag=$(node -p 'require("./manifest.json").version')" >> "$GITHUB_OUTPUT"
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        # Obsidian downloads only main.js and manifest.json from the release;
        # extra assets like versions.json trigger review warnings.
        # Existing releases are never overwritten: Obsidian verifies that the
        # assets' attestation was built from the tag's commit, so replacing
        # assets under an old tag fails attestation. Every change must ship
        # as a new version (bump manifest.json/versions.json in the PR).
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            echo "::error::Release $TAG already exists. Overwriting a released version is not allowed — bump manifest.json's version (and versions.json) in the PR."
            exit 1
          fi
          gh release create "$TAG" main.js manifest.json \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --generate-notes
